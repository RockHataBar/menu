<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Коктейльне Меню</title>
  <style>
    @font-face {
      font-family: 'Johnson';
      src: url('Johnson.woff2') format('woff2'),
           url('Johnson.woff') format('woff');
      font-weight: normal;
      font-style: normal;
    }

    :root {
      --gold: #FFD700;
      --bg: #000;
      --text: #fff;
      --secondary: #ccc;
    }

    body {
      margin: 0;
      padding: 20px;
      background-color: var(--bg);
      color: var(--gold);
      font-family: 'Johnson', serif;
      line-height: 1.4;
    }

    h1 {
      text-align: center;
      font-size: 32px;
      letter-spacing: 3px;
      margin-bottom: 30px;
    }

    .drink {
      display: flex;
      flex-direction: column;
      border-bottom: 1px solid #333;
      padding: 16px 0;
    }

    .name {
      font-weight: bold;
      font-size: 20px;
      letter-spacing: 1px;
      margin-bottom: 5px;
      word-break: break-word;
    }

    .desc {
      color: var(--secondary);
      font-size: 15px;
      margin-bottom: 4px;
      word-break: break-word;
    }

    .volume-price {
      color: var(--text);
      font-size: 16px;
      margin-bottom: 8px;
    }

    @media (max-width: 480px) {
      body {
        padding: 15px;
      }

      h1 {
        font-size: 26px;
      }

      .name {
        font-size: 18px;
      }

      .desc {
        font-size: 14px;
      }

      .volume-price {
        font-size: 15px;
      }
    }

    @media (min-width: 768px) {
      .drink {
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
      }

      .name, .desc, .volume-price {
        flex: 1 1 100%;
      }
    }
  </style>
</head>
<body>

  <h1>МЕНЮ</h1>

  <div id="menu"></div>

  <script>
    const drinks = [
      { name: 'ДЖИН/ ТОНК/ ЛАЙМ', desc: 'ДЖИН ТОНІК', volume: '150 МЛ', price: '100 ₴' },
      { name: 'ТЕКІЛА САНРАЙЗ', desc: 'ТЕКІЛА / АПЕЛЬСИНОВИЙ СІК / ГРЕНАДИН', volume: '150 МЛ', price: '120 ₴' },
      { name: 'СЕКС ON ЗЕ БІЧ', desc: 'ГОРІЛКА / ПЕРСИКОВИЙ ЛІКЕР / АПЕЛЬСИНОВИЙ СІК / СІК ЖУРАВЛИНИ', volume: '200 МЛ', price: '110 ₴' },
      { name: 'КРИВАВА МЕРІ', desc: 'ГОРІЛКА / ТОМАТНИЙ СІК / ТАБАСКО / ВУСТЕРСЬКИЙ СОУС / ЛАЙМ', volume: '150 МЛ', price: '80 ₴' },
      { name: 'NEGRONI', desc: 'СУХИЙ ДЖИН / ЧЕРВОНИЙ ВЕРМУТ / БІТТЕР', volume: '200 МЛ', price: '200 ₴' },
      { name: 'ROSO TONIC', desc: 'ЧЕРВОНИЙ ВЕРМУТ / ТОНІК / АПЕЛЬСИН', volume: '200 МЛ', price: '120 ₴' },
      { name: 'CUBA LIBRE', desc: 'ЗОЛОТИЙ РОМ / COCA COLA / ЛАЙМ', volume: '150 МЛ', price: '100 ₴' },
      { name: 'СИНІЙ КАМІКАДЗЕ', desc: 'ГОРІЛКА / ЛИМОННИЙ СІК / BLU CURASAO', volume: '150 МЛ', price: '80 ₴' },
      { name: 'ПАН ІВАН', desc: 'ГОРІЛКА / ЛИМОННИЙ СІК / ГРЕНАДИН', volume: '50 МЛ', price: '80 ₴' },
      { name: 'ПРАПОР', desc: 'ГОРІЛКА / ЛІКЕР АПЕЛЬСИНОВИЙ', volume: '50 МЛ', price: '50 ₴' },
      { name: 'КАЙДАШ', desc: 'ГОРІЛКА / ТАБАСКО / ГРЕНАДИН', volume: '50 МЛ', price: '60 ₴' },
      { name: 'ЗЕЛЕНИЙ МЕКСИКАНЕЦЬ', desc: 'ТЕКІЛА / ЛІКЕР ЗЕЛЕНИЙ БАНАН / ФРЕШ ЛАЙМА', volume: '50 МЛ', price: '110 ₴' },
      { name: 'ЯКИЙСЬ ШОТ', desc: 'ЄГЕРМЕЙСТЕР / ЛИМОННИЙ СІК', volume: '50 МЛ', price: '70 ₴' },
      { name: 'МЕРКУРІЙ', desc: 'САМБУКА / БЕЙЛІЗ / ГРЕНАДИН', volume: '50 МЛ', price: '90 ₴' },
      { name: 'ІНТЕРСІТІ', desc: 'СЕТ ІЗ ДЕСЯТИ ШОТІВ КРАФТОВИХ НАСТОЯНОК 20% ТА 40%', volume: '50 МЛ Х 10', price: '500 ₴' },

    ];

    const menuDiv = document.getElementById('menu');

    function renderMenu() {
      menuDiv.innerHTML = '';
      drinks.forEach((drink) => {
        const drinkDiv = document.createElement('div');
        drinkDiv.className = 'drink';

        const nameDiv = document.createElement('div');
        nameDiv.className = 'name';
        nameDiv.textContent = drink.name;

        const descDiv = document.createElement('div');
        descDiv.className = 'desc';
        descDiv.textContent = drink.desc;

        const volumePriceDiv = document.createElement('div');
        volumePriceDiv.className = 'volume-price';
        volumePriceDiv.textContent = `${drink.volume} — ${drink.price}`;

        drinkDiv.appendChild(nameDiv);
        drinkDiv.appendChild(descDiv);
        drinkDiv.appendChild(volumePriceDiv);

        menuDiv.appendChild(drinkDiv);
      });
    }

    renderMenu();
  </script>

</body>
</html>
