<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>RockHata Menu</title>
  <style>
    @font-face {
      font-family: 'Johnson';
      src: url('Johnson.woff2') format('woff2');
      font-weight: normal; font-style: normal; font-display: swap;
    }

    :root {
      --gold: #FFD700;
      --bg: #000;
      --text: #fff;
      --secondary: #ccc;
      --nav-bg: rgba(17, 17, 17, 0.95);
    }

    /* Исправление поведения адресной строки и плавный скролл */
    html {
      scroll-behavior: smooth;
      scroll-padding-top: 85px; /* Высота липкой шапки */
      height: 101%; /* Гарантирует наличие скролла для активации интерфейса браузера */
    }

   * { box-sizing: border-box; }

html {
  scroll-behavior: smooth;
  scroll-padding-top: 100px; /* Увеличил, чтобы был запас */
}

body {
  margin: 0;
  padding: 0 0 60px 0; /* Убрал боковые отступы здесь */
  background-color: var(--bg);
  color: var(--gold);
  font-family: 'Johnson', sans-serif;
  overflow-x: hidden; /* Защита от горизонтального скролла всей страницы */
}

/* Контент ограничиваем отдельно, чтобы навигация была на всю ширину */
h1, #menu-content {
  padding: 0 20px;
}

.navbar {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: var(--nav-bg);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-bottom: 1px solid #222;
}

.nav-center-brand { 
  text-align: center; 
  padding: 10px 0 5px 0; 
  font-size: 18px; 
  font-weight: bold; 
  letter-spacing: 3px; 
}
.nav-center-brand a { color: var(--gold); text-decoration: none; }

.nav-container {
  display: flex; 
  overflow-x: auto; 
  -webkit-overflow-scrolling: touch;
  padding: 12px 20px; 
  gap: 20px; /* Увеличил расстояние для удобства нажатия пальцем */
  align-items: center;
  
  /* Скрываем скроллбар для всех браузеров */
  scrollbar-width: none; /* Firefox */
  -ms-overflow-style: none; /* IE/Edge */
}

/* Скрываем скроллбар для Chrome/Safari */
.nav-container::-webkit-scrollbar { 
  display: none; 
}

.nav-container a {
  display: inline-block; /* Чтобы padding и border работали корректно */
  color: var(--gold); 
  text-decoration: none; 
  font-weight: bold;
  font-size: 14px; 
  white-space: nowrap; 
  letter-spacing: 1px; 
  transition: 0.3s;
  padding-bottom: 8px; /* Чуть больше места для линии */
  opacity: 0.7;
}

.nav-container a.active { 
  color: var(--text); 
  opacity: 1;
  border-bottom: 2px solid var(--gold); 
}
    /* 🍹 Стилизация продуктов */
    h1 { text-align: center; font-size: 32px; letter-spacing: 3px; margin: 20px 0; }
    h2 { border-bottom: 1px solid #333; padding-bottom: 8px; margin: 30px 0 15px 0; color: var(--text); font-size: 22px; text-transform: uppercase; }

    .drink {
      display: flex; justify-content: space-between; align-items: flex-start;
      border-bottom: 1px solid #222; padding: 16px 0; gap: 12px;
    }

    .drink-info { flex: 1; }
    .name { font-weight: bold; font-size: 17px; margin-bottom: 4px; color: var(--gold); text-transform: uppercase; }
    .desc { color: var(--secondary); font-size: 13px; margin-bottom: 8px; line-height: 1.3; }
    .volume-price { color: var(--text); font-size: 15px; font-weight: bold; white-space: nowrap; }

    /* Фото продукта */
    .drink-image { width: 85px; height: 85px; flex-shrink: 0; cursor: pointer; overflow: hidden; border-radius: 8px; border: 1px solid #333; }
    .drink-image img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }

    /* 🖼️ Модальное окно (Увеличение фото) */
    #modal {
      display: none; position: fixed; z-index: 2000; top: 0; left: 0;
      width: 100%; height: 100%; background: rgba(0,0,0,0.95);
      justify-content: center; align-items: center; cursor: zoom-out;
    }
    #modal img { max-width: 90%; max-height: 80%; border-radius: 10px; border: 2px solid var(--gold); box-shadow: 0 0 20px rgba(255, 215, 0, 0.4); }

    @media (min-width: 768px) {
      .nav-container { justify-content: center; }
      .drink-image { width: 110px; height: 110px; }
    }
  </style>
</head>

    function openModal(src) {
  const modal = document.getElementById('modal');
  const modalImg = document.getElementById('modal-img');
  modalImg.src = src;
  modal.style.display = 'flex';
  document.body.style.overflow = 'hidden';
    }

    function renderMenu(items, containerId) {
      const menuDiv = document.getElementById(containerId);
      if(!menuDiv) return;
      items.forEach((drink) => {
        const drinkDiv = document.createElement('div');
        drinkDiv.className = 'drink';

        const infoDiv = document.createElement('div');
        infoDiv.className = 'drink-info';
        infoDiv.innerHTML = `
          <div class="name">${drink.name}</div>
          ${drink.desc ? `<div class="desc">${drink.desc}</div>` : ''}
          <div class="volume-price">${drink.volume ? drink.volume + ' — ' : ''}${drink.price}</div>
        `;

        drinkDiv.appendChild(infoDiv);

        if (drink.img) {
  const imgDiv = document.createElement('div');
  imgDiv.className = 'drink-image';
          imgDiv.onclick = () => openModal(drink.img);
          imgDiv.innerHTML = `<img src="${drink.img}" alt="${drink.name}" loading="lazy">`;
          drinkDiv.appendChild(imgDiv);
        }
        menuDiv.appendChild(drinkDiv);
      });
    }

    Object.entries(menuData).forEach(([key, items]) => renderMenu(items, `menu-${key}`));

    const sections = document.querySelectorAll("section");
    const navLinks = document.querySelectorAll(".nav-container a");
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          navLinks.forEach(link => {
            link.classList.toggle("active", link.getAttribute("href") === `#${entry.target.id}`);
          });
        }
      });
    }, { threshold: 0.3, rootMargin: "-10% 0px -70% 0px" });
    sections.forEach(section => observer.observe(section));
  </script>
